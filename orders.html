<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f7f9fc;margin:0;}
.container{max-width:1100px;margin:30px auto;padding:20px;}
.order-card{
background:#fff;
padding:15px;
margin-bottom:15px;
display:flex;
gap:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}
.order-card img{
width:120px;height:100px;object-fit:cover;border-radius:8px;
}
.price{color:#1DA1C9;font-weight:700;}
.empty{text-align:center;margin-top:40px;color:#777;}
.status{
padding:5px 10px;
background:#fff4d6;
color:#d48806;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
<h1>📦 My Orders</h1>
<div id="ordersContainer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

/* ===============================
   USER LOGIN
=============================== */
const username = localStorage.getItem("loggedInUser");

if(!username){
 alert("Please login first");
 window.location.href="auth.html";
}

/* ===============================
   SAME DB AS CART + LOGIN
=============================== */
const firebaseConfig = {
  apiKey: "AIzaSyA890SKxHYlOOCx5CZVrGjJwy_RvePD3Tc",
  authDomain: "safar-sign-up-and-login.firebaseapp.com",
  databaseURL: "https://safar-sign-up-and-login-default-rtdb.firebaseio.com",
  projectId: "safar-sign-up-and-login"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const container = document.getElementById("ordersContainer");

/* ===============================
   FETCH ORDERS
=============================== */

db.ref("orders/"+username)
.on("value", snapshot=>{

 container.innerHTML="";

 if(!snapshot.exists()){
   container.innerHTML="<div class='empty'>No orders yet</div>";
   return;
 }

 snapshot.forEach(child=>{

   const p = child.val();
   const date = new Date(p.orderedAt).toLocaleString();

   container.innerHTML += `
   <div class="order-card">

      <img src="${p.image}" onerror="this.src='logo.png'">

      <div>
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>

        <div class="status">
          ${(p.status || "placed").toUpperCase()}
        </div>

        <div style="font-size:13px;color:#777;margin-top:5px;">
          Ordered on: ${date}
        </div>
      </div>

   </div>
   `;
 });

});

</script>

</body>
</html>
