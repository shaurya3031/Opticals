<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard | Shree Swami Opticals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#1DA1C9;
    --accent:#F7941D;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#f7f9fc,#eef3f8);}

.header{
    background:white;
    box-shadow:0 4px 20px rgba(0,0,0,.05);
    padding:12px 25px;
}
.header-inner{
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo-section{display:flex;align-items:center;gap:12px;}
.logo-section img{height:55px;}
.logo-section h2{color:var(--primary);}

.header-buttons{display:flex;gap:10px;}
.btn{
    padding:10px 18px;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
.home-btn{background:var(--primary);}
.logout-btn{background:var(--accent);}

.container{max-width:1100px;margin:35px auto;padding:0 20px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

.card{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

.avatar{
    width:70px;height:70px;
    background:var(--primary);
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:700;
    margin-bottom:15px;
}

.clock{font-size:22px;font-weight:700;color:var(--primary);}

/* NEW ACTION BUTTONS */
.actions{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.action-btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
.action-btn:hover{background:#1588aa;}

@media(max-width:800px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="header">
<div class="header-inner">
<div class="logo-section">
<img src="logo.png">
<h2>Shree Swami Opticals</h2>
</div>

<div class="header-buttons">
<button class="btn home-btn" onclick="goHome()">Home</button>
<button class="btn logout-btn" onclick="logout()">Logout</button>
</div>
</div>
</header>

<div class="container">

<h1 id="welcomeText">Welcome 👋</h1>

<div class="grid">

<!-- USER CARD -->
<div class="card">
<div class="avatar" id="avatar">U</div>

<h3>User Details</h3>
<div>Full Name: <span id="fullName"></span></div>
<div>Username: <span id="userNameText"></span></div>
<div>Gender: <span id="gender"></span></div>
<div>Date of Birth: <span id="dob"></span></div>

<!-- NEW BUTTONS -->
<div class="actions">
<button class="action-btn" onclick="openCart()">🛒 My Cart</button>
<button class="action-btn" onclick="openOrders()">📦 My Orders</button>
</div>

</div>

<!-- ACTIVITY -->
<div class="card">
<h3>Login Activity</h3>
<div>Login Time: <span id="loginTime"></span></div>
<div>Status: Online</div>
<div>Live Time: <span class="clock" id="clock"></span></div>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="auth-guard.js"></script>

<script>

const loggedUser = localStorage.getItem("loggedInUser");

/* FETCH USER INFO */
db.ref("users/" + loggedUser).once("value").then(snapshot=>{

    if(!snapshot.exists()) return;

    const data = snapshot.val();

    fullName.innerText = data.fullName;
    userNameText.innerText = data.username;
    gender.innerText = data.gender;
    dob.innerText = data.dob;

    welcomeText.innerText = "Welcome, " + data.fullName + " 👋";
    avatar.innerText = data.fullName.charAt(0).toUpperCase();
});

/* CLOCK */
loginTime.innerText = new Date().toLocaleString();
setInterval(()=>{
    clock.innerText = new Date().toLocaleTimeString();
},1000);

/* NAVIGATION */
function goHome(){ window.location.href="index.html"; }
function openCart(){ window.location.href="cart.html"; }
function openOrders(){ window.location.href="orders.html"; }

function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href="auth.html";
}

</script>

</body>
</html>
